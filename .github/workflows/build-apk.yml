name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci

      - name: Generate audio files
        run: node scripts/generate-noise.js

      - name: Generate assets
        run: node scripts/generate-assets.js

      - name: Prebuild native project
        run: npx expo prebuild --platform android --clean

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: White Noise For Sleeping v${{ github.run_number }}
          body: |
            Auto-built APK for Android.

            ## Install
            1. Download the `app-release.apk` file below
            2. Open it on your Android device
            3. Allow installation from unknown sources if prompted
          files: app-release.apk
          generate_release_notes: false
